[mod-setting-description]
pyops-bridge-enabled=Allow PyOps to send and receive localhost UDP packets while the panel is open. Factorio must still be started with --enable-lua-udp <port>.
pyops-bridge-port=Local UDP port for the PyOps companion service. Factorio must be started with --enable-lua-udp.
pyops-debug-log-events=Write bridge events to script-output for debugging.

[pyops]
panel-title=PyOps
open-tooltip=Open PyOps
refresh=Ping bridge
status-not-connected=Bridge status: not connected
status-disabled=Bridge status: disabled in mod settings
status-refreshing=Bridge status: connecting…
status-syncing=Bridge status: pushing state…
status-connected=Bridge status: connected
status-version-mismatch=⚠ Version mismatch — PyOps app protocol v__1__, mod v__2__. Update the mod or app.
status-error=Bridge error: __1__
bridge-hint=UDP bridge to the PyOps app on port __1__. Enable it in mod settings and launch Factorio with --enable-lua-udp.
sync-now=Sync now
sync-tooltip=Push your current research (and live state) to PyOps right now — no need to wait for research to finish.
locate-no-factory-search=PyOps: install the Factory Search mod to locate buildings from the web UI.

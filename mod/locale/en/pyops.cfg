status-not-connected=Bridge status: not connected
status-no-udp=Bridge status: launch Factorio with --enable-lua-udp
status-refreshing=Bridge status: connecting…
status-syncing=Bridge status: pushing state…
status-connected=Bridge status: connected
status-version-mismatch=⚠ Version mismatch — PyOps app protocol v__1__, mod v__2__. Update the mod or app.
status-error=Bridge error: __1__
bridge-hint=UDP bridge to the PyOps app on port __1__. Launch Factorio with --enable-lua-udp on a different port to connect.
sync-now=Sync now

pyops-allow-eval=Allow app-driven Lua eval

[mod-setting-description]
pyops-bridge-port=UDP port the PyOps app listens on (the mod's send target; default 37657). Launch Factorio with --enable-lua-udp on a DIFFERENT free port — it can't share this one.
pyops-allow-eval=Let the PyOps app run Lua snippets in this game (the assistant asks for your approval per snippet; MCP/dev tools run directly). Turn off to refuse every eval — note this also disables the app's in-game screenshot capture, which rides on eval.

